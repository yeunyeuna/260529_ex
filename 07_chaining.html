<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise Chaining</title>
  </head>
  <body>
    <script>
      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }
      delay(1000)
        .then(() => {
          if (Math.random() > 0.5) {
            console.log("성공 1");
          } else {
            throw new Error("실패");
          }
        })
        .then(() => {
          if (Math.random() > 0.5) {
            console.log("성공 2");
          } else {
            throw new Error("실패");
          }
        })
        .then(() => console.log("성공하셨네요?"))
        .catch(() => console.log("실패하셨네요?"))
        .finally(() => console.log("성공 실패 여부 상관없음"))
        // 종결
        .then(() => console.log("새로운 Promise Chain"));
    </script>
  </body>
</html>
