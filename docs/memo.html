<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모를 남기자!</title>
    <!-- Favicon -->
    <link rel="icon" href="./img/favicon.png" type="image/png" />

    <!-- Open Graph Metadata -->
    <meta property="og:title" content="심플 메모 앱 - 보드" />
    <meta property="og:description" content="작성한 메모들을 확인하고 복사하거나 지울 수 있습니다." />
    <meta property="og:image" content="https://yeunyeuna.github.io/260529_ex/docs/img/og_preview.png" />
    <meta property="og:type" content="website" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

    <style>
      /* Reset & Base Styles */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        background-image: url("./img/bg.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #1d1d1f;
        min-height: 100vh;
      }

      textarea {
        resize: none;
        font-family: inherit;
      }

      /* Helpers */
      .center {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Layout */
      #page {
        min-height: 100vh;
        flex-direction: column;
        padding: 60px 20px;
        background: rgba(255, 255, 255, 0.4);
      }

      #container {
        flex-direction: column;
        gap: 32px;
        max-width: 900px;
        width: 100%;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin: 0;
        text-align: center;
      }

      /* Main Navigation Button */
      a[href="index.html"] {
        text-decoration: none;
      }

      a[href="index.html"] button {
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        color: #495057;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        padding: 10px 20px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      a[href="index.html"] button:hover {
        background: #ffffff;
        color: #1d1d1f;
        transform: translateY(-1px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.05);
      }

      /* Memo Writer Form */
      #memoWriter {
        flex-direction: column;
        gap: 16px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        width: 100%;
        max-width: 500px;
        transition: all 0.3s ease;
      }

      #memoWriter:focus-within {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
      }

      #memoWriter textarea {
        width: 100%;
        height: 120px;
        padding: 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        font-size: 0.95rem;
        line-height: 1.6;
        color: #2c3e50;
        background: #ffffff;
        outline: none;
        transition: all 0.2s ease;
      }

      #memoWriter textarea:focus {
        border-color: #1d1d1f;
        box-shadow: 0 0 0 3px rgba(29, 29, 31, 0.05);
      }

      #memoWriter div {
        display: flex;
        gap: 10px;
        width: 100%;
      }

      #memoWriter button {
        flex: 1;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 700;
        padding: 14px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }

      #memoWriter button:not(#resetBtn) {
        background: #1d1d1f;
        color: #ffffff;
        box-shadow: 0 4px 12px rgba(29, 29, 31, 0.15);
      }

      #memoWriter button:not(#resetBtn):hover {
        background: #333336;
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(29, 29, 31, 0.25);
      }

      #memoWriter #resetBtn {
        background: #f1f3f5;
        color: #495057;
        border: 1px solid rgba(0, 0, 0, 0.04);
      }

      #memoWriter #resetBtn:hover {
        background: #e9ecef;
        color: #212529;
        transform: translateY(-1px);
      }

      /* Memo List Board */
      #memoList {
        gap: 20px;
        padding: 16px 0;
        flex-wrap: wrap;
        width: 100%;
        justify-content: center;
      }

      /* Dynamically created Memo Cards */
      #memoList div {
        position: relative;
        width: 260px;
        min-height: 180px;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.05);
        border-radius: 16px;
        padding: 24px 20px 64px 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.02),
                    0 1px 3px rgba(0, 0, 0, 0.01);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
        color: #2c3e50;
        font-size: 0.95rem;
        line-height: 1.6;
        word-break: break-all;
        white-space: pre-wrap;
        animation: cardEntrance 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      #memoList div:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
      }

      /* Elegant accent borders using selectors */
      #memoList div:nth-child(4n+1) { border-top: 5px solid #ffc078; } /* Pastel orange */
      #memoList div:nth-child(4n+2) { border-top: 5px solid #74c0fc; } /* Pastel blue */
      #memoList div:nth-child(4n+3) { border-top: 5px solid #63e6be; } /* Pastel green */
      #memoList div:nth-child(4n+4) { border-top: 5px solid #faa2c1; } /* Pastel pink */

      /* Buttons appended to memo list div */
      #memoList div button {
        position: absolute;
        bottom: 16px;
        padding: 7px 14px;
        font-family: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      /* First button (rmBtn - 삭제) */
      #memoList div button:nth-of-type(1) {
        right: 80px;
        background: #fff5f5;
        color: #e03131;
      }

      #memoList div button:nth-of-type(1):hover {
        background: #ffe3e3;
        color: #c92a2a;
        transform: translateY(-1px);
      }

      /* Second button (cpBtn - 복사) */
      #memoList div button:nth-of-type(2) {
        right: 16px;
        background: #f3f0ff;
        color: #7048e8;
      }

      #memoList div button:nth-of-type(2):hover {
        background: #e5dbff;
        color: #5f3dc4;
        transform: translateY(-1px);
      }

      /* Card Entry Animation */
      @keyframes cardEntrance {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <section id="page" class="center">
      <section id="container" class="center">
        <h1>메모를 남기자!</h1>
        <a href="index.html">
          <button>← 메인으로 가기</button>
        </a>
        <form id="memoWriter" class="center">
          <textarea name="memo" required placeholder="메모할 내용을 여기에 적어보세요..."></textarea>
          <div>
            <button>작성</button>
            <button id="resetBtn" type="button">리셋</button>
          </div>
        </form>
        <section id="memoList" class="center">
          <!-- 작성된 메모를 배치 -->
        </section>
      </section>
    </section>
    
    <script>
      document.addEventListener("DOMContentLoaded", main);

      // DOM 요소
      const memoWriter = document.querySelector("#memoWriter");
      const memoList = document.querySelector("#memoList");
      const resetBtn = document.querySelector("#resetBtn");

      // 진입점. entrypoint
      function main() {
        console.log("DOM 로딩 완료");
        memoWriter.addEventListener("submit", memoWriterHandler);
        resetBtn.addEventListener("click", () => {
          localStorage.removeItem("memo");
          drawPrevMemo(); // 재렌더링.
        });
        // 화면에 표시하면?
        drawPrevMemo();
      }

      function memoWriterHandler(event) {
        event.preventDefault();
        console.log("form 로직 시작");
        const formData = new FormData(event.target);
        const memoText = formData.get("memo");
        console.log(memoText);

        // 데이터 추가 시 LocalStorage를 사용해서 영속성(persistence)
        const id = saveMemo(memoText);

        drawMemoBox(memoText, id);

        // 폼 리셋
        event.target.reset();
      }

      // 특정한 텍스트를, 특정한 리스트에 구현해서 넣겠다
      function drawMemoBox(memoText, id) {
        const memoBox = document.createElement("div");
        memoBox.textContent = memoText;
        memoList.append(memoBox);
        
        // 삭제 로직
        const rmBtn = document.createElement("button");
        rmBtn.textContent = "삭제";
        rmBtn.addEventListener("click", () => {
          const memoObj = getPrevMemo();
          console.log("memoId", id);
          memoObj[id] = undefined;
          localStorage.setItem("memo", JSON.stringify(memoObj));
          memoBox.remove();
        });
        
        // 복사 로직
        const cpBtn = document.createElement("button");
        cpBtn.textContent = "복사";
        cpBtn.addEventListener("click", () => {
          if (confirm("정말 복사하시겠습니까?")) {
            navigator.clipboard.writeText(memoText);
            alert("복사 완료");
          }
        });
        memoBox.append(rmBtn);
        memoBox.append(cpBtn);
      }

      function saveMemo(memoText) {
        const memoObj = getPrevMemo();
        const timeKey = Date.now();
        memoObj[timeKey] = memoText;
        console.log(memoObj);
        localStorage.setItem("memo", JSON.stringify(memoObj));
        return timeKey;
      }

      // 로직 분리
      function getPrevMemo() {
        const prevMemo = localStorage.getItem("memo") ?? "{}";
        console.log(prevMemo);
        let memoObj;
        try {
          memoObj = JSON.parse(prevMemo);
        } catch (err) {
          console.log(err);
          memoObj = {};
        }
        return memoObj;
      }

      function drawPrevMemo() {
        const prevMemo = getPrevMemo();
        console.log(prevMemo);
        memoList.innerHTML = ""; // 다시 렌더링 시에는 한 번 비우게
        for (const key in prevMemo) {
          drawMemoBox(prevMemo[key], key);
        }
      }
    </script>
  </body>
</html>
