<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모를 남기자!</title>
    <style>
      /* 전체 공통으로 작동해야하는 태그 수준의 서식 */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      textarea {
        resize: none;
      }
      /* 반복해서 쓰이는 내용은 클래스로 작성 */
      .center {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      /* id로 특정하게 쓸 요소들에 대한 서식 */
      /* id를 의미하는 선택자 # */
      #page {
        height: 100vh;
        flex-direction: column;
      }

      #container {
        flex-direction: column;
        gap: 12px;
      }

      #container h1 {
        /* align, justify */
        text-align: center;
      }

      #memoWriter {
        flex-direction: column;
        gap: 8px;
        background-color: beige;
        padding: 16px;
        border: 1px solid gray;
        border-radius: 8px;
        /* 원/타원 만들 때 */
        /* border-radius: 50%; */
      }

      #memoWriter button {
        padding: 6px 12px;
        /* margin, padding : 전체 */
        /* margin, padding : 위 아래 */
        /* margin, padding : 위 오 아 왼 */
      }

      #memoList {
        gap: 8px;
        padding: 8px;
        flex-wrap: wrap;
      }

      #memoList div {
        width: 240px;
        height: 160px;
        border: 1px solid gray;
        border-radius: 8px;
        padding: 16px;
        /* https://colorhunt.co/ */
        background-color: #fff7c5;
      }
    </style>
  </head>
  <body>
    <section id="page" class="center">
      <section id="container" class="center">
        <h1>메모를 남기자!</h1>
        <a href="index.html">
          <button>메인으로 가기</button>
        </a>
        <form id="memoWriter" class="center">
          <!-- validation : 검증 -->
          <!-- 프런트엔드/브라우저/화면에서의 검증은 모두 회피/조작 -->
          <textarea name="memo" required></textarea>
          <div>
            <button>작성</button>
            <!-- 폼 자체의 기능(submit)을 안쓰고 자체 click으로 기능을 하겠다 -->
            <button id="resetBtn" type="button">리셋</button>
          </div>
        </form>
        <section id="memoList" class="center">
          <!-- 작성된 메모를 배치 -->
        </section>
      </section>
    </section>
    <script>
      document.addEventListener("DOMContentLoaded", main);

      // DOM 요소
      const memoWriter = document.querySelector("#memoWriter");
      const memoList = document.querySelector("#memoList");
      const resetBtn = document.querySelector("#resetBtn");

      // 진입점. entrypoint
      function main() {
        console.log("DOM 로딩 완료");
        memoWriter.addEventListener("submit", memoWriterHandler);
        resetBtn.addEventListener("click", () => {
          // localStorage.clear();
          // 현재 출처에 있는 모든 localStorage 데이터 X.
          localStorage.removeItem("memo");
          drawPrevMemo(); // 재렌더링.
        });
        // 화면에 표시하면?
        drawPrevMemo();
      }

      // 1. 일단 함수표현식으로 타입추론을 하면서 작성한다음에
      // 2. 나중에 꺼내서 아래에 배치
      function memoWriterHandler(event) {
        // form의 기본 이벤트를 금지/정지 시킨다
        event.preventDefault();
        console.log("form 로직 시작");
        const formData = new FormData(event.target);
        // console.log(formData);
        // console.log(...formData);
        const memoText = formData.get("memo");
        console.log(memoText);

        // 데이터 추가 시 LocalStorage를 사용해서 영속성(persistence)
        const id = saveMemo(memoText);

        // 추가할 텍스트
        // 내가 호출되었을 때의 스코프가 아니라 선언되었을 때의 스코프를 기억한다 -> 렉시컬 스코프
        // memoList는 기억하는데 memoText 기억 X.
        // drawMemoBox(memoText);
        drawMemoBox(memoText, id);
        // 삭제 때 쓰기 위해 id 전달

        // const memoBox = document.createElement("div");
        // // memoBox.classList.add
        // memoBox.textContent = memoText;
        // memoList.append(memoBox);

        // 폼 리셋 (남은 폼의 인풋 입력 내역을 지워줌)
        event.target.reset();
      }

      //   특정한 텍스트를, 특정한 리스트에 구현해서 넣겠다
      function drawMemoBox(memoText, id) {
        const memoBox = document.createElement("div");
        // memoBox.classList.add
        memoBox.textContent = memoText;
        memoList.append(memoBox);
        // 삭제 로직
        const rmBtn = document.createElement("button");
        rmBtn.textContent = "삭제";
        // 여기서 함수선언/표현을 하면 Lexical Scope로 바깥을 가져올 수 있다는 장점 (대신 관리가 어려워짐)
        rmBtn.addEventListener("click", () => {
          // localStorage 지우는게 필요
          const memoObj = getPrevMemo();
          //   delete memoObj[id];
          console.log("memoId", id);
          memoObj[id] = undefined; // JSON.stringfy 삭제 됨
          localStorage.setItem("memo", JSON.stringify(memoObj));
          // DOM만 지운 것
          memoBox.remove();
        });
        // 복사 로직
        const cpBtn = document.createElement("button");
        cpBtn.textContent = "복사";
        cpBtn.addEventListener("click", () => {
          if (confirm("정말 복사하시겠습니까?")) {
            navigator.clipboard.writeText(memoText);
            alert("복사 완료");
          }
        });
        memoBox.append(rmBtn);
        memoBox.append(cpBtn);
      }

      function saveMemo(memoText) {
        // 가장 최근 메모 1개만 저장하겠다
        // localStorage.setItem("memo", memoText);
        // localStorage.setItem("memo", []); // 삭제할 때 불편
        // const prevMemo = localStorage.getItem("memo") ?? {};
        // let memoObj;
        // try {
        //   // JSON text -> 객체
        //   memoObj = JSON.parse(prevMemo);
        //   // localStorage -> origin 공유
        // } catch (err) {
        //   console.log(err);
        //   memoObj = {};
        // }
        const memoObj = getPrevMemo();
        // 현재 시간을 숫자로 표시한 값
        const timeKey = Date.now();
        memoObj[timeKey] = memoText;
        console.log(memoObj);
        // localStorage는 문자열 key, value
        // 제대로 된 문자열 '변환' -> JSON.stringify, parse
        localStorage.setItem("memo", JSON.stringify(memoObj));
        // 생성 후 ID(Key) 값 리턴
        return timeKey;
      }

      // 로직 분리
      function getPrevMemo() {
        // const prevMemo = localStorage.getItem("memo") ?? {};
        const prevMemo = localStorage.getItem("memo") ?? "{}"; // 값이 없으면
        console.log(prevMemo);
        let memoObj;
        try {
          // JSON text -> 객체
          memoObj = JSON.parse(prevMemo);
          // localStorage -> origin 공유
        } catch (err) {
          console.log(err);
          memoObj = {};
        }
        return memoObj;
      }

      function drawPrevMemo() {
        // localStorage에서 데이터 빼오기
        // let prevMemo;
        // try {
        //   prevMemo = JSON.parse(localStorage.getItem("memo"));
        // } catch {
        //   prevMemo = {};
        // }
        const prevMemo = getPrevMemo();
        // timeKey : 메모값 -> 배열
        console.log(prevMemo);
        // 각각 메모 박스 그리기
        // 기존에 만약에 memoList에 dom 요소가 있으면 그냥 둠
        memoList.innerHTML = ""; // 다시 렌더링 시에는 한 번 비우게
        for (const key in prevMemo) {
          drawMemoBox(prevMemo[key], key);
        }
      }
    </script>
  </body>
</html>
