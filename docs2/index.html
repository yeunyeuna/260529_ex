<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모 앱</title>
    <!-- Favicon -->
    <link rel="icon" href="./img/favicon.png" type="image/png" />
    
    <!-- Open Graph Metadata -->
    <meta property="og:title" content="심플 메모 앱" />
    <meta property="og:description" content="생각나는 아이디어나 할 일을 언제든 쉽고 빠르게 메모하세요." />
    <meta property="og:image" content="/img/og_preview.png" />
    <meta property="og:type" content="website" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />

    <style>
      * {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        background-image: url("./img/bg.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* Centered glassmorphic card for container */
      #container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 24px;
        padding: 48px 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), 
                    0 1px 3px rgba(0, 0, 0, 0.02);
        max-width: 420px;
        width: 90%;
        text-align: center;
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                    box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      #container:hover {
        transform: translateY(-6px);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 
                    0 1px 5px rgba(0, 0, 0, 0.03);
      }

      h1 {
        font-size: 2.2rem;
        font-weight: 800;
        color: #1d1d1f;
        margin: 0 0 28px 0;
        letter-spacing: -0.03em;
        line-height: 1.25;
      }

      #container > button {
        font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        color: #ffffff;
        background: #1d1d1f;
        border: none;
        border-radius: 14px;
        padding: 16px 32px;
        cursor: pointer;
        width: 100%;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 8px 20px rgba(29, 29, 31, 0.15);
        letter-spacing: 0.05em;
      }

      #container > button:hover {
        background: #333336;
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(29, 29, 31, 0.25);
      }

      #container > button:active {
        transform: translateY(0);
        box-shadow: 0 4px 10px rgba(29, 29, 31, 0.15);
      }

      /* Entrance Animation */
      @keyframes fadeInScale {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(10px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>메모 하러 가기</h1>
      <button>이동</button>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", main);

      const container = document.querySelector("#container");
      const button = document.querySelector("#container > button");
      
      function main() {
        console.log("DOM 로딩 완료");
        button.addEventListener("click", () => {
          location.href = "memo.html";
        });
      }
    </script>
  </body>
</html>
