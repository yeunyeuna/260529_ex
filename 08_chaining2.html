<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise Chaining</title>
  </head>
  <body>
    <script>
      function f1() {
        return new Promise((resolve) => {
          return setTimeout(() => resolve(100), 1000);
        });
      }
      const p1 = f1();
      p1.then((v) => console.log(v));
      // async, await
      // async -> Promise -> return v -> resolve(v)
      // Promise : 성공 시 결과를 resolve에 담아서 then -> handler
      // 실패 시 : throw, error -> err.
    </script>
  </body>
</html>
