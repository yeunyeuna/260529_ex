<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
  </head>
  <body>
    <button onclick="delay()">기다려</button>
    <button id="stopper">멈춰</button>
    <script>
      function delay() {
        // setTimeout(() => console.log("1초 지남"), 1000);
        const timerId = setTimeout(() => console.log("5초 지남"), 5000);
        console.log(timerId);
        document.querySelector("#stopper").addEventListener("click", () => {
          console.log(`timer ${timerId} 정지`);
          clearTimeout(timerId);
        });
        //   2. 이벤트루프에서 마지막에 쓰기 위해서...
      }
      // set interval
      let counter = 0;
      const timerId2 = setInterval(() => {
        counter++;
        console.log(counter);
      }, 1000);
      document.querySelector("#stopper").addEventListener("click", () => {
        console.log(`timer ${timerId2} 정지`);
        clearTimeout(timerId2);
      });
    </script>
  </body>
</html>
