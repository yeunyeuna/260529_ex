<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise</title>
  </head>
  <body>
    <script>
      // callback 2가지 문제 : 1/ 순서 보장 X, 2/ 예외 처리 X
      function f1(callback) {
        return new Promise((resolve, reject) => {
          // 성공 시에는
          setTimeout(() => {
            resolve();
          }, 1000); // 처리될 때까지 pending
        });
      }
      function f2(callback) {
        return new Promise((resolve, reject) => {
          // 실패 시에는
          reject(new Error("실패함"));
        });
      }
      const p1 = f1();
      const p2 = f2();
      console.log(p1);
      console.log(p2);
      p1.then(() => console.log("성공함 1")).catch(() =>
        console.log("실패함 1"),
      );
      p2.then(() => console.log("성공함 2")).catch(() =>
        console.log("실패함 2"),
      );
    </script>
  </body>
</html>
